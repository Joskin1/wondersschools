services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wonders-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: Wonders
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
      PORT: "80"
    volumes:
      - app-storage:/var/www/storage
      - app-database:/var/www/database
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  app-storage:
  app-database:
