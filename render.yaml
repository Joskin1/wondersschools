# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: wonders-web
    runtime: docker
    plan: free
    region: oregon
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    autoDeployTrigger: commit
    disk:
      name: wonders-data
      mountPath: /var/www/database
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: Wonders
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://wondersschools.onrender.com"
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: SEED_ON_DEPLOY
        value: "true"
